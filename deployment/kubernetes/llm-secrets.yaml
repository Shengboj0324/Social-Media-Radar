# Kubernetes secrets for LLM infrastructure
# IMPORTANT: This is a template. Replace with actual secrets using kubectl or sealed-secrets

apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: default
type: Opaque
stringData:
  # OpenAI API Key
  openai-api-key: "REPLACE_WITH_ACTUAL_OPENAI_API_KEY"
  
  # Anthropic API Key
  anthropic-api-key: "REPLACE_WITH_ACTUAL_ANTHROPIC_API_KEY"
  
  # Database URL
  database-url: "postgresql://user:password@postgres-service:5432/social_media_radar"
  
  # Redis URL (if using authentication)
  redis-url: "redis://redis-service:6379/0"

---
