version: '3.8'

services:
  # Main LLM application
  llm-app:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.llm
    container_name: social-media-radar-llm
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # API Keys (use .env file or secrets)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # LLM Configuration
      - LLM_PRIMARY_MODEL=${LLM_PRIMARY_MODEL:-gpt-4o}
      - LLM_FALLBACK_MODELS=${LLM_FALLBACK_MODELS:-claude-3-5-sonnet-20241022,gpt-4-turbo-2024-04-09}
      - LLM_ENABLE_COST_OPTIMIZATION=${LLM_ENABLE_COST_OPTIMIZATION:-true}
      - LLM_MAX_COST_PER_REQUEST=${LLM_MAX_COST_PER_REQUEST:-0.10}
      
      # vLLM Configuration (optional)
      - VLLM_ENDPOINT=${VLLM_ENDPOINT:-http://vllm:8000}
      
      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@postgres:5432/social_media_radar}
      
      # Redis (for caching)
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      
      # Monitoring
      - PROMETHEUS_ENABLED=true
      - PROMETHEUS_PORT=9090
      
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - llm-network
    depends_on:
      - postgres
      - redis
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # vLLM server for local models (optional)
  vllm:
    image: vllm/vllm-openai:latest
    container_name: social-media-radar-vllm
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - MODEL_NAME=${VLLM_MODEL_NAME:-meta-llama/Meta-Llama-3.1-8B-Instruct}
      - TENSOR_PARALLEL_SIZE=${VLLM_TENSOR_PARALLEL_SIZE:-1}
      - GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
    volumes:
      - ./models:/root/.cache/huggingface
    networks:
      - llm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - vllm  # Only start with --profile vllm

  # PostgreSQL database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: social-media-radar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-social_media_radar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - llm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: social-media-radar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - llm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: social-media-radar-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - llm-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: social-media-radar-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    networks:
      - llm-network
    depends_on:
      - prometheus

  # Alertmanager for alert routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: social-media-radar-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - llm-network

  # PostgreSQL exporter for database metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: social-media-radar-postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://user:password@postgres:5432/social_media_radar?sslmode=disable
    networks:
      - llm-network
    depends_on:
      - postgres

  # Redis exporter for cache metrics
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: social-media-radar-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - llm-network
    depends_on:
      - redis

  # Node exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: social-media-radar-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:

