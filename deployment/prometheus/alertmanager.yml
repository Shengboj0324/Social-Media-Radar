# Alertmanager configuration for LLM infrastructure

global:
  # Global configuration
  resolve_timeout: 5m
  
  # SMTP configuration for email alerts
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@social-media-radar.com'
  smtp_auth_username: 'alerts@social-media-radar.com'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

# Templates for alert notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert routing
route:
  # Default receiver
  receiver: 'default'
  
  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']
  
  # Wait time before sending first notification
  group_wait: 10s
  
  # Wait time before sending notification about new alerts in group
  group_interval: 10s
  
  # Wait time before re-sending notification
  repeat_interval: 3h
  
  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 1h
    
    # Warning alerts - standard notification
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 6h
    
    # Cost alerts - notify finance team
    - match:
        category: cost
      receiver: 'finance'
      repeat_interval: 12h
    
    # Infrastructure alerts - notify ops team
    - match:
        category: infrastructure
      receiver: 'ops'
      repeat_interval: 3h

# Inhibition rules - suppress alerts when others are firing
inhibit_rules:
  # Suppress warning if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
  
  # Suppress individual service alerts if cluster is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['cluster']

# Receivers - notification destinations
receivers:
  # Default receiver - log only
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true
  
  # Critical alerts - multiple channels
  - name: 'critical'
    email_configs:
      - to: 'oncall@social-media-radar.com'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.html" . }}'
        send_resolved: true
    
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-critical'
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
    
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        description: '{{ .GroupLabels.alertname }}'
        severity: 'critical'
  
  # Warning alerts - email and Slack
  - name: 'warning'
    email_configs:
      - to: 'team@social-media-radar.com'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.html" . }}'
        send_resolved: true
    
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-warning'
        title: '[WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
  
  # Finance team - cost alerts
  - name: 'finance'
    email_configs:
      - to: 'finance@social-media-radar.com'
        headers:
          Subject: '[COST ALERT] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.html" . }}'
        send_resolved: true
  
  # Ops team - infrastructure alerts
  - name: 'ops'
    email_configs:
      - to: 'ops@social-media-radar.com'
        headers:
          Subject: '[INFRASTRUCTURE] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.html" . }}'
        send_resolved: true
    
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#ops'
        title: '[INFRASTRUCTURE] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

# Time intervals for muting alerts
time_intervals:
  # Business hours (9 AM - 5 PM weekdays)
  - name: business_hours
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '17:00'
        weekdays: ['monday:friday']
  
  # Off hours
  - name: off_hours
    time_intervals:
      - times:
          - start_time: '17:00'
            end_time: '09:00'
        weekdays: ['monday:friday']
      - weekdays: ['saturday', 'sunday']

